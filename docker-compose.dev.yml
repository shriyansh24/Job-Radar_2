services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      JR_DEBUG: "true"

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    command: ["python", "-m", "app.runtime.scheduler"]
    environment:
      JR_DEBUG: "true"
      JR_SCHEDULER_READY_MARKER: /tmp/jobradar-scheduler.ready

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports: ["5173:5173"]
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
