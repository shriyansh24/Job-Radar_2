        type: essay

  - name: ibm
    display_name: IBM
    ats_type: greenhouse
    portal_url: https://www.ibm.com/careers/
    form_mappings:
      first_name: "input#first_name, input[data-qa='input-first-name']"
      last_name: "input#last_name, input[data-qa='input-last-name']"
      email: "input#email, input[data-qa='input-email']"
      phone: "input#phone, input[data-qa='input-phone']"
      resume: "input[type='file']"
      linkedin: "input[data-qa*='linkedin'], input[placeholder*='LinkedIn']"
      location: "input[data-qa='input-location']"
      education: "select[data-qa*='education'], select[name*='education']"
    custom_questions:
      - key: work_authorization
        question: "Are you authorized to work in the country where this position is based?"
        type: yes_no
      - key: requires_sponsorship
        question: "Do you require sponsorship to work in this location now or in the future?"
