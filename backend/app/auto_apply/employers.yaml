  - name: oracle
    display_name: Oracle
    ats_type: workday
    portal_url: https://oracle.taleo.net/careers/
    form_mappings:
      first_name: "input[id*='firstName'], input[name*='FirstName']"
      last_name: "input[id*='lastName'], input[name*='LastName']"
      email: "input[id*='email'], input[name*='Email']"
      phone: "input[id*='phone'], input[name*='Phone']"
      resume: "input[type='file']"
      linkedin: "input[placeholder*='LinkedIn'], input[name*='linkedin']"
      address: "input[id*='Address1'], input[name*='Address1']"
      city: "input[id*='City'], input[name*='City']"
      state: "select[id*='State'], select[name*='State']"
      zip: "input[id*='Zip'], input[name*='Zip']"
    custom_questions:
      - key: work_authorization
        question: "Are you legally authorized to work in the United States on a full-time basis?"
        type: yes_no
      - key: requires_sponsorship
        question: "Will you now or in the future require Oracle to commence a visa or employment authorization?"
        type: yes_no
      - key: technical_experience
        question: "Describe your most significant technical achievement."
