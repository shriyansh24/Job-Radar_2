name: CI
on: [push, pull_request]
jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: [5432:5432]
        options: --health-cmd "pg_isready -U test" --health-interval 10s
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: pip install uv && uv sync --frozen
        working-directory: backend
      - run: uv run python -m pip check
        working-directory: backend
      - run: uv export --frozen --format requirements-txt --no-emit-project -o .ci-requirements.txt
        working-directory: backend
      - run: uv tool run pip-audit -r .ci-requirements.txt
        working-directory: backend
      - run: uv tool run bandit -r app/ -c pyproject.toml --severity-level medium
        working-directory: backend
      - run: uv run ruff check .
        working-directory: backend
      - run: uv run mypy app/auth/service.py app/config.py app/shared/middleware.py app/scraping/deduplication.py app/scraping/port.py --ignore-missing-imports
        working-directory: backend
      - run: uv run pytest --cov=app --cov-fail-under=60 tests/
        working-directory: backend
        env:
          JR_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22' }
      - run: npm ci
        working-directory: frontend
      - run: npm install --no-save @vitest/coverage-v8
        working-directory: frontend
      - run: npm audit --audit-level high
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run test -- --run --coverage --coverage.thresholds.statements=40
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
